{% extends "layout.html" %}
{% set title = "Edit Camera - AI Director" %}
{% set page_title = "Edit Camera" %}

{% block content %}
<div class="card">
<div class="card-header">
<h3 class="card-title">Form Edit Camera</h3>
</div>

<form method="POST">
<div class="card-body">

<div class="form-group">
<label>Nama Camera</label>
<input type="text" name="name" class="form-control" value="{{ camera['name'] }}" required>
</div>

<div class="form-group">
<label>Court</label>
<select name="court_uuid" class="form-control">
<option value="">Belum Assign</option>
{% for court in courts %}
<option value="{{ court['uuid'] }}" {% if camera['court_uuid'] == court['uuid'] %}selected{% endif %}>
{{ court["name"] }}
</option>
{% endfor %}
</select>
</div>

<div class="form-group">
<label>IP Address</label>
<input type="text" name="ip_address" class="form-control" value="{{ camera['ip_address'] }}" required>
</div>

<div class="form-group">
<label>RTSP URL</label>
<input type="text" name="rtsp_url" class="form-control" value="{{ camera['rtsp_url'] or '' }}">
</div>

<div class="form-group">
<label>Vendor</label>
<input type="text" name="vendor" class="form-control" value="{{ camera['vendor'] or '' }}">
</div>

<div class="form-group">
<label>Model</label>
<input type="text" name="model" class="form-control" value="{{ camera['model'] or '' }}">
</div>

</div>

<div class="card-footer">
<button type="submit" class="btn btn-primary">Update</button>
<a href="/camera" class="btn btn-secondary">Kembali</a>
</div>
</form>
</div>
{% endblock %}
