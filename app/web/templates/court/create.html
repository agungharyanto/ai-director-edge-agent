{% extends "layout.html" %}
{% set title = "Tambah Court - AI Director" %}
{% set page_title = "Tambah Court" %}

{% block content %}
<div class="card">
<div class="card-header">
<h3 class="card-title">Form Court</h3>
</div>

<form method="POST">
<div class="card-body">

<div class="form-group">
<label>Nama Court</label>
<input type="text" name="name" class="form-control" placeholder="Contoh: Court 1" required>
</div>

<div class="form-group">
<label>Deskripsi</label>
<textarea name="description" class="form-control" placeholder="Contoh: Lapangan utama"></textarea>
</div>

</div>

<div class="card-footer">
<button type="submit" class="btn btn-primary">Simpan</button>
<a href="/court" class="btn btn-secondary">Kembali</a>
</div>
</form>
</div>
{% endblock %}
