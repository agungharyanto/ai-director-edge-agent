{% extends "layout.html" %}
{% set title = "Tambah Credential" %}
{% set page_title = "Tambah Credential Profile" %}

{% block content %}
<div class="card">
<div class="card-header">
<h3 class="card-title">Form Credential</h3>
</div>

<form method="POST">
<div class="card-body">

<div class="form-group">
<label>Vendor</label>
<select name="vendor" class="form-control" required>
<option value="Hikvision">Hikvision</option>
<option value="Dahua">Dahua</option>
<option value="Uniview">Uniview</option>
<option value="Generic ONVIF">Generic ONVIF</option>
</select>
</div>

<div class="form-group">
<label>Profile Name</label>
<input type="text" name="name" class="form-control" placeholder="Contoh: Default Hikvision Site Ini">
</div>

<div class="form-group">
<label>Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="form-group">
<label>Priority</label>
<input type="number" name="priority" class="form-control" value="1" required>
<small class="text-muted">Angka kecil dicoba lebih dulu.</small>
</div>

<div class="form-check">
<input type="checkbox" name="enabled" class="form-check-input" checked>
<label class="form-check-label">Enabled</label>
</div>

</div>

<div class="card-footer">
<button type="submit" class="btn btn-primary">Simpan</button>
<a href="/credential" class="btn btn-secondary">Kembali</a>
</div>
</form>
</div>
{% endblock %}
