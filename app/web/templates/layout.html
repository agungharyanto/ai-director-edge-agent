<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>{{ title or "AI Director" }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">

<style>
.alarm-card{animation:ambulance 1s infinite;background:#dc3545!important;color:white!important}
@keyframes ambulance{
0%{box-shadow:0 0 0 red;transform:scale(1)}
50%{box-shadow:0 0 25px red;transform:scale(1.03)}
100%{box-shadow:0 0 0 red;transform:scale(1)}
}
</style>
</head>

<body class="hold-transition sidebar-mini">
<div class="wrapper">

<nav class="main-header navbar navbar-expand navbar-white navbar-light">
<ul class="navbar-nav">
<li class="nav-item">
<a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a>
</li>
<li class="nav-item d-none d-sm-inline-block">
<a href="/" class="nav-link">AI Director Edge Agent</a>
</li>
</ul>
</nav>

<aside class="main-sidebar sidebar-dark-primary elevation-4">
<a href="/" class="brand-link">
<span class="brand-text font-weight-light">AI Director</span>
</a>

<div class="sidebar">
<nav class="mt-2">
<ul class="nav nav-pills nav-sidebar flex-column">

<li class="nav-item"><a href="/" class="nav-link"><i class="nav-icon fas fa-gauge"></i><p>Dashboard</p></a></li>
<li class="nav-item"><a href="/court" class="nav-link"><i class="nav-icon fas fa-table-tennis-paddle-ball"></i><p>Court</p></a></li>
<li class="nav-item"><a href="/camera" class="nav-link"><i class="nav-icon fas fa-video"></i><p>Camera</p></a></li>
<li class="nav-item"><a href="/event" class="nav-link"><i class="nav-icon fas fa-bell"></i><p>Event</p></a></li>
<li class="nav-item"><a href="/discovery" class="nav-link"><i class="nav-icon fas fa-search"></i><p>Discovery</p></a></li>

<li class="nav-header">NEXT</li>

<li class="nav-item"><a href="#" class="nav-link disabled"><i class="nav-icon fas fa-record-vinyl"></i><p>Recording</p></a></li>
<li class="nav-item"><a href="#" class="nav-link disabled"><i class="nav-icon fas fa-network-wired"></i><p>VPN</p></a></li>
<li class="nav-item"><a href="#" class="nav-link disabled"><i class="nav-icon fas fa-cloud"></i><p>Cloud</p></a></li>

</ul>
</nav>
</div>
</aside>

<div class="content-wrapper">
<section class="content-header">
<div class="container-fluid">
<h1>{{ page_title or "Dashboard" }}</h1>
</div>
</section>

<section class="content">
<div class="container-fluid">
{% block content %}{% endblock %}
</div>
</section>
</div>

<footer class="main-footer">
<strong>AI Director Edge Agent</strong> v0.4.0
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

{% block scripts %}{% endblock %}
</body>
</html>
