services:
  edge-recorder:
    build: .
    container_name: ai-director-edge-recorder
    user: "1000:1000"
    env_file:
      - .env
    volumes:
      - ./recordings:/recordings
      - ./scripts:/scripts
      - ./logs:/logs
      - ./config:/config
    restart: unless-stopped
    command: /scripts/record-loop.sh
